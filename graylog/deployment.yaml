apiVersion: apps/v1
kind: Deployment
metadata:
  name: graylog
  namespace: graylog
  labels:
    app: graylog
spec:
  replicas: 2
  selector:
    matchLabels:
      app: graylog
  template:
    metadata:
      labels:
        app: graylog
    spec:
      containers:
      - name: graylog
        image: graylog/graylog:6.1
        ports:
        - containerPort: 9000
          name: web
        - containerPort: 12201
          name: gelf
          protocol: UDP
        - containerPort: 1514
          name: syslog
        envFrom:
        - configMapRef:
            name: graylog-config
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        volumeMounts:
        - name: graylog-data
          mountPath: /usr/share/graylog/data
      volumes:
      - name: graylog-data
        emptyDir: {}
