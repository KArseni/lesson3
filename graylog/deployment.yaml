apiVersion: apps/v1
kind: Deployment
metadata:
  name: graylog
  namespace: testgray1010mn
  labels:
    app: graylog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: graylog
  template:
    metadata:
      labels:
        app: graylog
    spec:
      containers:
      - name: graylog
        image: graylog/graylog:6.1
        ports:
        - containerPort: 9000
          name: web
        - containerPort: 12201
          name: gelf
          protocol: UDP
        - containerPort: 1514
          name: syslog
        env:
        - name: GRAYLOG_HTTP_EXTERNAL_URI
          value: "http://localhost:9000/"
        volumeMounts:
        - name: graylog-config
          mountPath: /usr/share/graylog/data/config/graylog.conf
          subPath: graylog.conf
          readOnly: true
        - name: graylog-data
          mountPath: /usr/share/graylog/data/journal
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: graylog-config
        configMap:
          name: graylog-config
      - name: graylog-data
        emptyDir: {}
